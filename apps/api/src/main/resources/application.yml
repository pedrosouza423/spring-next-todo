spring:
  application:
    name: spring-next-todo-api

  datasource:
    url: jdbc:h2:mem:tododb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

app:
  jwt:
    secret: "Z3VhcmRhZXNzZXNlZ3JlZG9tdWl0b2JlbXBvcmZhdm9yYXF1aQ=="
    expiration-ms: 86400000